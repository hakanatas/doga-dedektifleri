<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dergiyi Oku — Doğa Dedektifleri · Sayı 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --green:#1f6b32; --green-d:#0e4a22; --yellow:#F3D308; --lime:#7AC22B; --orange:#F36F0D;
}
*{box-sizing:border-box; font-family:'Montserrat',system-ui,sans-serif;}
html,body{margin:0; padding:0; height:100%;}
body{display:flex; flex-direction:column; background:#dfe3da;}

/* ===== TOP BAR ===== */
.bar{flex:none; background:var(--green-d); color:#fff; display:flex; align-items:center; gap:8px; padding:9px 14px; box-shadow:0 2px 12px rgba(0,0,0,.3); z-index:10; flex-wrap:wrap;}
.bar a.home{display:inline-flex; align-items:center; gap:7px; color:#fff; text-decoration:none; font-weight:800; font-size:13.5px; padding:7px 11px; border-radius:8px; background:rgba(255,255,255,.12); white-space:nowrap;}
.bar a.home:hover{background:rgba(255,255,255,.22);}
.bar .title{font-weight:700; font-size:13px; color:#cfe6d2; margin-right:auto; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:40vw;}
.bar .title b{color:#fff;}
.nav-c{display:flex; align-items:center; gap:8px; flex:1; justify-content:flex-end;}
.nav-c button{flex:none; border:0; cursor:pointer; font-weight:900; font-size:16px; width:40px; height:40px; border-radius:9px; background:var(--yellow); color:#3a2a00; transition:.12s;}
.nav-c button:hover{background:#ffe33a;}
.nav-c button:disabled{opacity:.35; cursor:default;}
.nav-c select{font-weight:700; font-size:13px; padding:10px 10px; border-radius:9px; border:0; background:#fff; color:#1a1a1a; max-width:260px; cursor:pointer; min-width:0;}
.nav-c .pg{flex:none; font-weight:800; font-size:13px; color:#dff0e2; min-width:60px; text-align:center;}

/* ===== VIEWER ===== */
.viewer{flex:1; position:relative; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; background:#dfe3da;}
.holder{position:relative; margin:0 auto;}
.holder iframe{position:absolute; top:0; left:0; transform-origin:0 0; border:0; background:#dfe3da; display:block;}

/* side arrows on wide screens */
.side{position:fixed; top:50%; transform:translateY(-50%); z-index:5; border:0; cursor:pointer; width:52px; height:76px; font-size:24px; font-weight:900; color:#fff; background:rgba(14,74,34,.6); backdrop-filter:blur(3px); transition:.15s;}
.side:hover{background:rgba(14,74,34,.9);}
.side:disabled{opacity:0; pointer-events:none;}
.side.prev{left:0; border-radius:0 14px 14px 0;}
.side.next{right:0; border-radius:14px 0 0 14px;}
@media(max-width:820px){.side{display:none;} .bar .title{display:none;}}
@media(max-width:560px){
  .bar{gap:6px; padding:8px 10px;}
  .bar a.home{font-size:12.5px; padding:7px 9px;}
  .bar a.home .lbl-long{display:none;}
  .nav-c{flex-basis:100%; justify-content:space-between; gap:6px;}
  .nav-c select{flex:1; max-width:none;}
  .nav-c .pg{min-width:48px; font-size:12px;}
}

/* progress */
.prog{flex:none; height:5px; background:#0a3518;}
.prog i{display:block; height:100%; background:linear-gradient(90deg,var(--lime),var(--yellow)); width:0; transition:width .3s;}

/* floating mobile prev/next */
.fab{display:none; position:fixed; bottom:16px; z-index:20; border:0; cursor:pointer; width:54px; height:54px; border-radius:50%; font-size:24px; font-weight:900; color:#3a2a00; background:var(--yellow); box-shadow:0 6px 18px rgba(0,0,0,.35);}
.fab:disabled{opacity:.3;}
.fab.prev{left:14px;} .fab.next{right:14px;}
@media(max-width:820px){.fab{display:flex; align-items:center; justify-content:center;}}
</style>
</head>
<body>

<div class="bar">
  <a class="home" href="index.html">📖 <span class="lbl-long">Dergi </span>Ana Sayfa</a>
  <a class="home site" href="https://www.alkevtech.com" target="_blank" rel="noopener">🏠 Alkev Tech</a>
  <span class="title"><b>Doğa Dedektifleri</b> · Sayı 1 — <span id="cur-name"></span></span>
  <div class="nav-c">
    <button id="b-prev" onclick="go(-1)" title="Önceki (←)">‹</button>
    <select id="sel" onchange="show(+this.value)"></select>
    <span class="pg" id="pg"></span>
    <button id="b-next" onclick="go(1)" title="Sonraki (→)">›</button>
  </div>
</div>
<div class="prog"><i id="prog-i"></i></div>

<div class="viewer" id="viewer">
  <button class="side prev" id="s-prev" onclick="go(-1)" title="Önceki bölüm">‹</button>
  <div class="holder" id="holder">
    <iframe id="frame" title="Dergi sayfası" scrolling="no"></iframe>
  </div>
  <button class="side next" id="s-next" onclick="go(1)" title="Sonraki bölüm">›</button>
</div>
<button class="fab prev" id="f-prev" onclick="go(-1)" title="Önceki">‹</button>
<button class="fab next" id="f-next" onclick="go(1)" title="Sonraki">›</button>

<script>
const PAGES=[
  {f:'kapak-sf1.html',            n:'Kapak',                              p:'sf. 1'},
  {f:'editorden-sf2.html',        n:'Editörden',                          p:'sf. 2'},
  {f:'icindekiler-sf3.html',      n:'İçindekiler',                        p:'sf. 3'},
  {f:'ne-var-ne-yok-sf4-5.html',  n:'Ne Var Ne Yok?',                     p:'sf. 4–5'},
  {f:'canopy-sf6-9-LPR.html',     n:'★ Canopy: Gizli Dünya',              p:'sf. 6–9'},
  {f:'yasam-bolgeleri-sf10-12.html', n:'Dünyanın Yaşam Bölgeleri',        p:'sf. 10–12'},
  {f:'bir-damla-su-sf13.html',    n:'Bir Damla Suda Koca Bir Dünya',      p:'sf. 13'},
  {f:'bal-arilari-sf14-16.html',  n:'Çalışkan Bal Arıları',               p:'sf. 14–16'},
  {f:'sozluk-sf17.html',          n:'Biyoçeşitlilik Sözlüğüm',            p:'sf. 17'},
  {f:'endemik-sf18-19.html',      n:'Endemik Canlılarımız',               p:'sf. 18–19'},
  {f:'tehlike-sf20-21.html',      n:'Tehlike Çanları',                    p:'sf. 20–21'},
  {f:'besin-agi-sf22-23.html',    n:'Besin Ağı',                          p:'sf. 22–23'},
  {f:'mini-ekosistem-sf24-25.html', n:'Şişede Mini Ekosistem',            p:'sf. 24–25'},
  {f:'soylesi-sf26-27.html',      n:'Söyleşi: Bir Biyologla Tanışalım',   p:'sf. 26–27'},
  {f:'bulmaca-sf28-29.html',      n:'Bulmaca Bahçesi',                    p:'sf. 28–29'},
  {f:'sen-de-yapabilirsin-sf30.html', n:'Sen de Yapabilirsin: 10 Adım',   p:'sf. 30'},
  {f:'gozlem-defterim-sf31.html', n:'Gözlem Defterim',                    p:'sf. 31'},
  {f:'sizden-gelenler-sf32.html', n:'Sizden Gelenler',                    p:'sf. 32'},
  {f:'yanitlar-sf33.html',        n:'Yanıtlar',                           p:'sf. 33'},
  {f:'arka-kapak-sf34.html',      n:'Arka Kapak',                         p:'sf. 34'},
  {f:'patara-sf35.html',          n:'Patara: Kaplumbağa Kart',            p:'sf. 35'},
  {f:'doga-gulumser-sf36.html',   n:'Doğa Gülümser',                      p:'sf. 36'},
  {f:'first-biobuzz-sf37.html',   n:'FIRST Canopy & BIOBUZZ',             p:'sf. 37'}
];
const PAGE_W=794;              // A4 genişliği (210mm ≈ 794px)
let cur=0;
const sel=document.getElementById('sel');
const frame=document.getElementById('frame');
const holder=document.getElementById('holder');
const viewer=document.getElementById('viewer');
PAGES.forEach((pg,i)=>{
  const o=document.createElement('option');
  o.value=i; o.textContent=`${i+1}. ${pg.n} (${pg.p})`;
  sel.appendChild(o);
});

/* iframe içeriğini viewer genişliğine sığdır (zoom-to-fit) */
function fit(){
  let ch=1123; // varsayılan tek A4 yüksekliği
  try{
    const d=frame.contentDocument;
    if(d && d.body){ ch=Math.max(d.body.scrollHeight, d.documentElement.scrollHeight); }
  }catch(e){}
  const avail=viewer.clientWidth;
  const scale=Math.min(1, avail/PAGE_W);
  frame.style.width=PAGE_W+'px';
  frame.style.height=ch+'px';
  frame.style.transform='scale('+scale+')';
  holder.style.width=(PAGE_W*scale)+'px';
  holder.style.height=(ch*scale)+'px';
}

function show(i){
  cur=Math.max(0,Math.min(PAGES.length-1,i));
  const pg=PAGES[cur];
  frame.onload=()=>{ fit(); setTimeout(fit,120); };  // fontlar yüklenince tekrar ölç
  frame.src=pg.f;
  document.getElementById('cur-name').textContent=pg.n;
  document.getElementById('pg').textContent=pg.p;
  sel.value=cur;
  const first=(cur===0), last=(cur===PAGES.length-1);
  document.getElementById('b-prev').disabled=document.getElementById('s-prev').disabled=document.getElementById('f-prev').disabled=first;
  document.getElementById('b-next').disabled=document.getElementById('s-next').disabled=document.getElementById('f-next').disabled=last;
  document.getElementById('prog-i').style.width=((cur+1)/PAGES.length*100)+'%';
  viewer.scrollTop=0;
  history.replaceState(null,'','#'+(cur+1));
}
function go(d){ show(cur+d); }
let rz; window.addEventListener('resize',()=>{ clearTimeout(rz); rz=setTimeout(fit,120); });
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft') go(-1);
  if(e.key==='ArrowRight') go(1);
});
window.addEventListener('hashchange',()=>{
  const h=parseInt(location.hash.slice(1));
  if(!isNaN(h) && h-1!==cur) show(h-1);
});
const start=parseInt(location.hash.slice(1));
show(!isNaN(start)?start-1:0);
</script>
</body>
</html>
